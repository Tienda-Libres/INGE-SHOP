<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Inge SHOP | Colección Exclusiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --main-bg: #FFFFFF;
            --sub-bg: #F9F9F9;
            --card-glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(212, 175, 55, 0.15);
            --text-dark: #121212;
            --text-gold: #B8860B;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 10%, #e1e1e1 0%, #e1e1e1 100%);
        }

        header {
            padding: 60px 5px;
            text-align: center;
            background: linear-gradient(135deg, #d6d6d6 0%, #d6d6d6 100%);
            border-bottom: 3px solid var(--gold);
            position: relative;
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom right, #333, var(--gold), #333);
            -webkit-background-clip: text;
            background-clip: text; /* Corrección de advertencia */
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .social-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px; 
        }

        .social-icon {
            color: var(--text-dark);
            font-size: 1.5rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--gold);
            transform: translateY(-3px);
        }

/* Estilo para el footer */
        .footer-socials {
            margin-bottom: 15px;
        }

        header p {
            color: #222222;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 35px;
            padding: 60px 30px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            perspective: 1200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.485), 0 5px 15px rgba(0,0,0,0.05);
            background: rgba(255, 255, 255, 0.9);
        }

        /* Barra de búsqueda y Filtros */
.search-container {
    background: #dedede;
    margin-top: -30px; /* Sube un poco para unirse al header */
    padding: 40px 20px 40px;
    border-radius: 40px 40px 0 0; /* Curva elegante */
    position: relative;
    z-index: 10;
    box-shadow: 0 -10px 20px rgba(51, 51, 51, 0.05);
}

.search-box {
    position: relative;
    max-width: 800px; /* Ancho máximo para que no se estire demasiado */
    margin: 0 auto 25px; /* Centra la barra y le da espacio abajo */
    padding: 0 20px; /* Margen interno para que no toque los bordes de la pantalla */
}

.search-box input {
    width: 100%;
    padding: 15px 20px 15px 50px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    background: var(--card-glass);
    backdrop-filter: blur(10px);
    font-family: 'Outfit';
    font-size: 1rem;
    transition: 0.3s;
    outline: none;
}

.search-box i {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
}

.search-box input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
}

.filter-tags {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.tag {
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    background: white;
    cursor: pointer;
    font-family: 'Outfit';
    font-size: 0.8rem;
    font-weight: 600;
    transition: 0.3s;
    color: #666;
}

.tag.active, .tag:hover {
    background: var(--gold) !important;
    color: white !important;
    border-color: var(--gold);
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    transform: scale(1.1); /* Efecto de resaltado */
}

        /* Contenedor multimedia (Imagen o Video) */
        .img-container {
            width: 100%;
            height: 260px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
            background: #fdfdfd;
            border-radius: 12px;
            overflow: hidden;
        }

        .card:hover .img-container {
            transform: rotateY(360deg) scale(1.05);
        }

        .img-container img, .img-container video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Cambia a 'cover' si prefieres que llenen todo el cuadro */
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08));
        }

        .card h3 {
            font-size: 1.3rem;
            margin: 10px 0 3px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .price {
            font-size: 1.5rem;
            color: var(--text-gold);
            font-weight: 700;
            display: block;
            margin-bottom: 25px;
        }

        .stock-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.65rem;
            background: rgba(212, 175, 55, 0.08);
            color: var(--text-gold);
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            font-weight: 600;
            z-index: 10;
        }

        .btn-wa {
            background-color: transparent;
            color: var(--text-gold);
            border: 1px solid var(--gold);
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.8rem;
        }

        .btn-wa:hover {
            background-color: var(--gold);
            color: #FFFFFF;
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            margin-top: 60px;
            font-size: 0.75rem;
            color: #999;
            background-color: var(--sub-bg);
        }
    </style>
</head>
<body>

    <header>
    <h1>INGE SHOP</h1>
    <p>MODA · JUGUETES · PERFUMES · BISUTERÍA</p>
    <div class="social-links">
        <a href="https://www.facebook.com/share/1JykU7PVZ7/" target="_blank" class="social-icon">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/ingeshop.oficial" target="_blank" class="social-icon">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
</header>

    <div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="busqueda" placeholder="Buscar perfumes, joyería..." onkeyup="filtrar()">
    </div>
    
    <div class="filter-tags">
        <button class="tag active" onclick="filtrarCategoria('todos', this)">Todos</button>
        <button class="tag" onclick="filtrarCategoria('Perfumes', this)">Perfumes</button>
        <button class="tag" onclick="filtrarCategoria('Bisutería', this)">Bisutería</button>
        <button class="tag" onclick="filtrarCategoria('Juguetes', this)">Juguetes</button>
        <button class="tag" onclick="filtrarCategoria('Moda', this)">Moda</button>
    </div>
</div>

    <div class="grid" id="contenedor"></div>

    <footer>
    <div class="footer-socials">
        <a href="https://www.facebook.com/share/1JykU7PVZ7/" target="_blank" class="social-icon" style="font-size: 1.2rem; margin: 0 10px;">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/ingeshop.oficial" target="_blank" class="social-icon" style="font-size: 1.2rem; margin: 0 10px;">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
    &copy; 2026 INGE SHOP. Todos los derechos reservados.<br>
    Hecho en Libres, Puebla.
</footer>

    <script>
        
        async function cargarProductos() {
            const contenedor = document.getElementById('contenedor');
            contenedor.innerHTML = '<p style="text-align:center;color:#666;width:100%;">Cargando colección exclusiva...</p>';

            try {
                const respuesta = await fetch('https://inge-shop.onrender.com/api/productos');
                
                if (!respuesta.ok) {
                    throw new Error(`Error del servidor: ${respuesta.status}`);
                }

                const productos = await respuesta.json();
                contenedor.innerHTML = ''; 

                if (productos.length === 0) {
                    contenedor.innerHTML = '<p style="text-align:center;color:#666;width:100%;">La colección está en camino. ¡Vuelve pronto!</p>';
                    return;
                }

                contenedor.innerHTML = productos.map(p => {
                    // Detectar si el link es de un video
                    const esVideo = p.imagen.match(/\.(mp4|webm|ogg|mov)$/i);

                    return `
                    <div class="card">
                        <span class="stock-badge">Disponibles: ${p.existencias}</span>
                        <div class="img-container">
                            ${esVideo ? 
                                `<video src="${p.imagen}" autoplay loop muted playsinline class="product-video"></video>` : 
                                `<img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://placehold.co/400x400/e0e0e0/666666?text=IngeShop'">`
                            }
                        </div>
                        <h3>${p.nombre}</h3>
                        <span class="price">$${p.precio} MXN</span>
                        <button class="btn-wa" onclick="pedir('${p.nombre}', ${p.precio})">Pedir vía WhatsApp</button>
                    </div>
                `}).join('');
            } catch (error) {
                console.error("Error crítico:", error);
                contenedor.innerHTML = `<p style="text-align:center;color:#ff4444;width:100%;">Hubo un problema al cargar la tienda.<br><small>${error.message}</small></p>`;
            }
        }

        function pedir(nombre, precio) {
            const numero = "5212761127068"; 
            const msg = `¡Hola! Me interesa la pieza exclusiva: *${nombre}* con precio de *$${precio} MXN*. ¿Me puedes dar detalles de disponibilidad?`;
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        cargarProductos();

        let productosLocales = []; // Variable global para guardar los productos

// Modifica tu función cargarProductos existente para que guarde los datos
async function cargarProductos() {
    const contenedor = document.getElementById('contenedor');
    try {
        const respuesta = await fetch('https://inge-shop.onrender.com/api/productos');
        productosLocales = await respuesta.json(); // Guardamos una copia
        renderizar(productosLocales); // Función que dibuja los productos
    } catch (error) {
        console.error("Error:", error);
    }
}

// Nueva función para dibujar las tarjetas en pantalla
function renderizar(lista) {
    const contenedor = document.getElementById('contenedor');
    if (lista.length === 0) {
        contenedor.innerHTML = '<p style="text-align:center;color:#666;width:100%;">No encontramos lo que buscas...</p>';
        return;
    }
    contenedor.innerHTML = lista.map(p => `
        <div class="card">
            <span class="stock-badge">${p.categoria || 'Colección'}</span>
            <div class="img-container">
                ${p.imagen.match(/\.(mp4|webm|mov)$/i) ? 
                    `<video src="${p.imagen}" autoplay loop muted playsinline class="product-video"></video>` : 
                    `<img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://placehold.co/400x400?text=IngeShop'">`
                }
            </div>
            <h3>${p.nombre}</h3>
            <span class="price">$${p.precio} MXN</span>
            <button class="btn-wa" onclick="pedir('${p.nombre}', ${p.precio})">Pedir vía WhatsApp</button>
        </div>
    `).join('');
}

// Función para buscar por texto
function filtrar() {
    const texto = document.getElementById('busqueda').value.toLowerCase();
    const filtrados = productosLocales.filter(p => 
        p.nombre.toLowerCase().includes(texto) || 
        (p.categoria && p.categoria.toLowerCase().includes(texto))
    );
    renderizar(filtrados);
}

// Función para filtrar por categorías (botones)
function filtrarCategoria(cat, btn) {
    // Cambiar estilo de botones
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    if (cat === 'todos') {
        renderizar(productosLocales);
    } else {
        const filtrados = productosLocales.filter(p => p.categoria === cat);
        renderizar(filtrados);
    }
}

    </script>
</body>
</html>
