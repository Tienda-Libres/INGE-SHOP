<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INGE SHOP | Gestión Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --text-dark: #121212; }
        body { font-family: 'Outfit', sans-serif; background: #e1e1e1; margin: 0; padding: 40px; color: var(--text-dark); }
        .container { max-width: 900px; margin: auto; }
        .card-admin { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(212,175,55,0.2); margin-bottom: 30px; }
        h2 { text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; background: linear-gradient(to right, #333, var(--gold), #333); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: 'Outfit'; background: white; }
        button { width: 100%; padding: 15px; background: var(--text-dark); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: var(--gold); transform: translateY(-2px); }
        
        .product-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .product-item { background: white; border-bottom: 1px solid #bcbcbc; transition: 0.3s; }
        .product-item td { padding: 15px; font-size: 0.9rem; }
        .btn-edit { background: #e1e1e1; color: #555; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; margin-right: 5px; font-family: 'Outfit'; }
        .btn-delete { background: #ffebee; color: #c62828; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-family: 'Outfit'; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-admin">
        <h2 id="formTitle">Subir Nuevo Producto</h2>
        <form id="prodForm">
            <input type="hidden" id="prodId"> 
            
            <div class="input-group">
                <label>Nombre del Producto</label>
                <input type="text" id="nombre" required placeholder="Ej. Perfume Sweet Candy">
            </div>

            <div class="input-group">
                <label>Categoría</label>
                <select id="categoria" required>
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="Perfumes">Perfumes</option>
                    <option value="Bisutería">Bisutería</option>
                    <option value="Juguetes">Juguetes</option>
                    <option value="Moda">Moda</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex:1">
                    <label>Precio (MXN)</label>
                    <input type="number" id="precio" required placeholder="0.00">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Existencias</label>
                    <input type="number" id="existencias" required placeholder="Cantidad">
                </div>
            </div>

            <div class="input-group">
                <label>URL Imagen o Video (Direct Link)</label>
                <input type="text" id="imagen" required placeholder="https://i.imgur.com/...">
            </div>

            <button type="submit" id="mainBtn">Guardar Producto</button>
            <button type="button" id="cancelBtn" style="display:none; background:#888; margin-top:10px;">Cancelar Edición</button>
        </form>
    </div>

    <div class="card-admin">
        <h2>Inventario Actual</h2>
        <table class="product-list" id="lista"></table>
    </div>
</div>

<script>
    const form = document.getElementById('prodForm');
    const lista = document.getElementById('lista');
    let editando = false;

    async function cargar() {
        try {
            const res = await fetch('http://localhost:3000/api/productos');
            const productos = await res.json();
            lista.innerHTML = ""; 

            productos.forEach(p => {
                const fila = document.createElement('tr');
                fila.className = 'product-item';
                fila.innerHTML = `
                    <td><strong>${p.nombre}</strong><br><small style="color:var(--gold)">${p.categoria || 'Sin categoría'}</small></td>
                    <td>$${p.precio}</td>
                    <td>${p.existencias} pzs</td>
                    <td style="text-align:right">
                        <button class="btn-edit">EDITAR</button>
                        <button class="btn-delete" onclick="eliminar('${p._id}')">BORRAR</button>
                    </td>
                `;

                fila.querySelector('.btn-edit').onclick = () => {
                    prepararEdicion(p._id, p.nombre, p.precio, p.existencias, p.imagen, p.categoria);
                };

                lista.appendChild(fila);
            });
        } catch (e) { 
            console.error("Error al cargar inventario:", e); 
        }
    }

    function prepararEdicion(id, nombre, precio, existencias, imagen, categoria) {
        editando = true;
        document.getElementById('prodId').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('precio').value = precio;
        document.getElementById('existencias').value = existencias;
        document.getElementById('imagen').value = imagen;
        document.getElementById('categoria').value = categoria || ""; // Cargamos la categoría
        
        document.getElementById('formTitle').textContent = "Editando Producto";
        document.getElementById('mainBtn').textContent = "Confirmar Cambios";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('prodId').value;
        const datos = {
            nombre: document.getElementById('nombre').value,
            precio: Number(document.getElementById('precio').value),
            existencias: Number(document.getElementById('existencias').value),
            imagen: document.getElementById('imagen').value,
            categoria: document.getElementById('categoria').value // Enviamos la categoría
        };

        const url = editando ? `http://localhost:3000/api/productos/${id}` : 'http://localhost:3000/api/productos';
        const metodo = editando ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                alert(editando ? "✨ ¡Producto actualizado!" : "✅ ¡Producto guardado!");
                location.reload();
            }
        } catch (err) {
            alert("Error al conectar con el servidor");
        }
    }

    async function eliminar(id) {
        if(confirm("¿Estás segura de eliminar este producto?")) {
            await fetch(`http://localhost:3000/api/productos/${id}`, { method: 'DELETE' });
            cargar();
        }
    }

    document.getElementById('cancelBtn').onclick = () => location.reload();

    cargar();
</script>
</body>
</html>
