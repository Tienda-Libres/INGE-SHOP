<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INGE SHOP | Gestión Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --text-dark: #121212; }
        body { font-family: 'Outfit', sans-serif; background: #e1e1e1; margin: 0; padding: 40px; color: var(--text-dark); position: relative; }
        .container { max-width: 900px; margin: auto; }
        .card-admin { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(212,175,55,0.2); margin-bottom: 30px; }
        h2 { text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; background: linear-gradient(to right, #333, var(--gold), #333); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: 'Outfit'; background: white; }
        button { width: 100%; padding: 15px; background: var(--text-dark); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: var(--gold); transform: translateY(-2px); }
        
        /* BOTÓN FLOTANTE */
        .btn-flotante { position: fixed; bottom: 30px; right: 30px; width: 180px; background: var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 100; }

        /* VENTANA FLOTANTE (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #888; }
        
        .fila-venta { border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 10px; }
        .btn-add-item { background: #f0f0f0; color: #333; padding: 10px; margin-bottom: 15px; font-size: 0.7rem; }
        .btn-ws { background: #25D366; }

        .product-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .product-item { background: white; border-bottom: 1px solid #bcbcbc; }
        .product-item td { padding: 15px; font-size: 0.9rem; }

        /* ESTILOS DEL TICKET VISUAL (OCULTO) */
        #ticket-visual { width: 300px; padding: 20px; background: white; font-family: 'Courier New', Courier, monospace; font-size: 12px; position: absolute; left: -9999px; top: 0; color: black; line-height: 1.2; }
        #ticket-visual .header { text-align: center; text-transform: uppercase; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        #ticket-visual .separator { border-top: 1px dashed black; margin: 5px 0; }
        #ticket-visual .total { font-weight: bold; font-size: 13px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-admin">
        <h2 id="formTitle">Subir Nuevo Producto</h2>
        <form id="prodForm">
            <input type="hidden" id="prodId"> 
            <div class="input-group"><label>Nombre</label><input type="text" id="nombre" required></div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="categoria" required>
                    <option value="Perfumes">Perfumes</option>
                    <option value="Bisutería">Bisutería</option>
                    <option value="Juguetes">Juguetes</option>
                    <option value="Moda">Moda</option>
                </select>
            </div>
            <div style="display: flex; gap: 15px;">
                <input type="number" id="precio" placeholder="Precio" required>
                <input type="number" id="existencias" placeholder="Stock" required>
            </div>
            <div class="input-group" style="margin-top:15px;"><label>URL Imagen</label><input type="text" id="imagen" required></div>
            <button type="submit" id="mainBtn">Guardar Producto</button>
            <button type="button" id="cancelBtn" style="display:none; background:#888; margin-top:10px;">Cancelar</button>
        </form>
    </div>

    <div class="card-admin">
        <h2>Inventario Actual</h2>
        <table class="product-list" id="lista"></table>
    </div>
</div>

<button class="btn-flotante" onclick="abrirVenta()">💰 Generar Venta</button>

<div id="modalVenta" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarVenta()">&times;</span>
        <h2 style="font-size: 1.2rem;">Nueva Venta Profesional</h2>
        
        <div class="input-group">
            <label>Filtrar por Categoría</label>
            <select id="filtro-categoria" onchange="actualizarListasVenta()">
                <option value="Todos">Todos</option>
                <option value="Perfumes">Perfumes</option>
                <option value="Bisutería">Bisutería</option>
                <option value="Juguetes">Juguetes</option>
                <option value="Moda">Moda</option>
            </select>
        </div>

        <div id="lista-articulos">
            <div class="fila-venta">
                <label>Producto</label>
                <select class="v-id" onchange="seleccionarProducto(this)" style="margin-bottom:5px;">
                    <option value="">Selecciona un producto...</option>
                </select>
                <div style="display: flex; gap: 5px;">
                    <input type="number" class="v-precio" placeholder="Precio $" style="flex:1">
                    <input type="number" class="v-cant" value="1" style="flex:0.5">
                </div>
            </div>
        </div>
        
        <button class="btn-add-item" onclick="nuevaFilaVenta()">+ Añadir Producto</button>

        <div class="input-group"><label>Descuento Directo ($)</label><input type="number" id="v-desc" value="0"></div>
        <div class="input-group">
            <label>Método de Pago</label>
            <select id="v-metodo">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>
        </div>
        
        <button class="btn-ws" onclick="generarTicketImagen()">Generar e Descontar Stock 📲</button>
    </div>
</div>

<div id="ticket-visual">
    <div class="header">INGE SHOP</div>
    <div style="text-align:center;">Libres, Puebla</div>
    <div class="separator"></div>
    <div>📍 Contacto:</div>
    <div>📞 2761137068 | 241376199</div>
    <div>📸 FB: INGE SHOP | IG: ingeshop.oficial</div>
    <div class="separator"></div>
    <div id="ticket-fecha"></div>
    <div class="separator"></div>
    <table style="width:100%; border-collapse:collapse;" id="ticket-items">
        </table>
    <div class="separator"></div>
    <div id="ticket-descuento"></div>
    <div class="total" id="ticket-total"></div>
    <div>💳 Pago: <span id="ticket-metodo"></span></div>
    <div class="separator"></div>
    <div style="text-align:center; font-style:italic; margin-top:10px;">✨ ¡Gracias por comprar en INGE SHOP!</div>
</div>

<script>
    const form = document.getElementById('prodForm');
    const lista = document.getElementById('lista');
    let editando = false;
    let productosBD = [];

    // --- CARGAR PRODUCTOS ---
    async function cargar() {
        try {
            const res = await fetch('https://inge-shop.onrender.com/api/productos');
            productosBD = await res.json();
            lista.innerHTML = ""; 
            productosBD.forEach(p => {
                const fila = document.createElement('tr');
                fila.className = 'product-item';
                fila.innerHTML = `
                    <td><strong>${p.nombre}</strong><br><small style="color:var(--gold)">${p.categoria}</small></td>
                    <td>$${p.precio}</td>
                    <td>${p.existencias} pzs</td>
                    <td style="text-align:right">
                        <button class="btn-edit" onclick="prepararEdicion('${p._id}','${p.nombre}',${p.precio},${p.existencias},'${p.imagen}','${p.categoria}')">EDITAR</button>
                        <button class="btn-delete" onclick="eliminar('${p._id}')">BORRAR</button>
                    </td>
                `;
                lista.appendChild(fila);
            });
            actualizarListasVenta();
        } catch (e) { console.error(e); }
    }

    // --- LÓGICA DE VENTA ---
    function abrirVenta() { document.getElementById('modalVenta').style.display = 'flex'; actualizarListasVenta(); }
    function cerrarVenta() { document.getElementById('modalVenta').style.display = 'none'; }
    
    function actualizarListasVenta() {
        const cat = document.getElementById('filtro-categoria').value;
        const selects = document.querySelectorAll('.v-id');
        selects.forEach(sel => {
            const valAnterior = sel.value;
            sel.innerHTML = '<option value="">Selecciona un producto...</option>';
            productosBD.filter(p => cat === "Todos" || p.categoria === cat).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p._id;
                opt.text = `${p.nombre} (${p.existencias} disp.)`;
                opt.dataset.precio = p.precio;
                opt.dataset.nombre = p.nombre;
                opt.dataset.stock = p.existencias;
                sel.appendChild(opt);
            });
            sel.value = valAnterior;
        });
    }

    function seleccionarProducto(el) {
        const opt = el.options[el.selectedIndex];
        el.closest('.fila-venta').querySelector('.v-precio').value = opt.dataset.precio || 0;
    }

    function nuevaFilaVenta() {
        const div = document.createElement('div');
        div.className = 'fila-venta';
        div.innerHTML = `
            <select class="v-id" onchange="seleccionarProducto(this)" style="margin-bottom:5px;">
                <option value="">Selecciona un producto...</option>
            </select>
            <div style="display: flex; gap: 5px;">
                <input type="number" class="v-precio" placeholder="Precio $" style="flex:1">
                <input type="number" class="v-cant" value="1" style="flex:0.5">
            </div>
        `;
        document.getElementById('lista-articulos').appendChild(div);
        actualizarListasVenta();
    }

    async function generarTicketImagen() {
        const ids = document.querySelectorAll('.v-id');
        const precios = document.querySelectorAll('.v-precio');
        const cantidades = document.querySelectorAll('.v-cant');
        const desc = parseFloat(document.getElementById('v-desc').value) || 0;
        const metodo = document.getElementById('v-metodo').value;
        
        let subtotal = 0;
        const ticketItemsTable = document.getElementById('ticket-items');
        ticketItemsTable.innerHTML = ""; // Limpiar ticket visual

        // 1. Validar y llenar ticket visual (oculto)
        for (let i = 0; i < ids.length; i++) {
            if (ids[i].value) {
                const opt = ids[i].options[ids[i].selectedIndex];
                const id = ids[i].value;
                const cant = parseInt(cantidades[i].value);
                const precio = parseFloat(precios[i].value);
                const stockActual = parseInt(opt.dataset.stock);

                if (cant > stockActual) {
                    alert(`No hay suficiente stock de ${opt.dataset.nombre}`);
                    return;
                }

                // Descontar en la base de datos (Render)
                await fetch(`https://inge-shop.onrender.com/api/productos/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ existencias: stockActual - cant })
                });

                let s = precio * cant;
                subtotal += s;

                // Llenar fila en el ticket visual
                const fila = `
                    <tr>
                        <td style="width:60%;">${opt.dataset.nombre}</td>
                        <td style="width:15%; text-align:right;">x${cant}</td>
                        <td style="width:25%; text-align:right;">$${s.toFixed(2)}</td>
                    </tr>
                `;
                ticketItemsTable.insertAdjacentHTML('beforeend', fila);
            }
        }

        const total = subtotal - desc;
        const fecha = new Date().toLocaleString();
        
        // 2. Actualizar datos finales en el ticket visual
        document.getElementById('ticket-fecha').innerText = `📅 ${fecha}`;
        document.getElementById('ticket-descuento').innerText = desc > 0 ? `📉 Descuento: -$${desc.toFixed(2)}` : '';
        document.getElementById('ticket-total').innerText = `💰 TOTAL: $${total.toFixed(2)}`;
        document.getElementById('ticket-metodo').innerText = metodo;

        // 3. Convertir Ticket HTML a Imagen usando html2canvas
        const ticketDiv = document.getElementById('ticket-visual');
        
        html2canvas(ticketDiv).then(canvas => {
            const imgData = canvas.toDataURL('image/png'); // Imagen Base64
            
            // 4. Preparar WhatsApp. No se puede enviar imagen Base64 directo,
            // pero podemos dar instrucciones y el mensaje de texto.
            const msjTexto = `*TICKET DIGITAL - INGE SHOP*\n----------------------------------\n📍 Libres, Puebla\n📞 2761137068\n----------------------------------\n✨ Aquí tienes tu recibo de compra. ¡Gracias por tu confianza!`;
            
            // Abrir WhatsApp con texto y preparar descarga de imagen
            const wsUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(msjTexto)}`;
            window.open(wsUrl, '_blank');

            // Descargar imagen automáticamente para que tú la reenvíes
            const linkDescarga = document.createElement('a');
            linkDescarga.download = `Ticket-INGE_SHOP-${Date.now()}.png`;
            linkDescarga.href = imgData;
            linkDescarga.click();

            alert("✨ Stock descontado. Se ha abierto WhatsApp y se ha descargado el Ticket en imagen. Reenvía la imagen a tu cliente en su chat.");
            location.reload(); // Recarga para ver el stock actualizado
        });
    }

    // --- FUNCIONES INVENTARIO (ORIGINALES) ---
    function prepararEdicion(id, n, p, e, i, c) {
        editando = true;
        document.getElementById('prodId').value = id;
        document.getElementById('nombre').value = n;
        document.getElementById('precio').value = p;
        document.getElementById('existencias').value = e;
        document.getElementById('imagen').value = i;
        document.getElementById('categoria').value = c;
        document.getElementById('formTitle').innerText = "Editando...";
        document.getElementById('mainBtn').innerText = "Guardar Cambios";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('prodId').value;
        const datos = {
            nombre: document.getElementById('nombre').value,
            precio: Number(document.getElementById('precio').value),
            existencias: Number(document.getElementById('existencias').value),
            imagen: document.getElementById('imagen').value,
            categoria: document.getElementById('categoria').value
        };
        const url = editando ? `https://inge-shop.onrender.com/api/productos/${id}` : 'https://inge-shop.onrender.com/api/productos';
        await fetch(url, { method: editando ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        location.reload();
    }

    async function eliminar(id) { if(confirm("¿Borrar?")) { await fetch(`https://inge-shop.onrender.com/api/productos/${id}`, {method:'DELETE'}); cargar(); } }
    document.getElementById('cancelBtn').onclick = () => location.reload();
    cargar();
</script>
</body>
</html>
