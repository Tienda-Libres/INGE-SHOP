<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INGE SHOP | Gestión Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --text-dark: #121212; }
        body { font-family: 'Outfit', sans-serif; background: #e1e1e1; margin: 0; padding: 40px; color: var(--text-dark); position: relative; }
        .container { max-width: 900px; margin: auto; }
        .card-admin { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(212,175,55,0.2); margin-bottom: 30px; }
        h2 { text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; background: linear-gradient(to right, #333, var(--gold), #333); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: 'Outfit'; background: white; }
        button { width: 100%; padding: 15px; background: var(--text-dark); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: var(--gold); transform: translateY(-2px); }
        
        .btn-flotante { position: fixed; bottom: 30px; right: 30px; width: 180px; background: var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #888; }
        
        .fila-venta { border: 1px solid #f0f0f0; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #fafafa; }
        .btn-add-item { background: #f0f0f0; color: #333; padding: 10px; margin-bottom: 15px; font-size: 0.7rem; }
        .btn-ws { background: #25D366; }

        .product-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .product-item { background: white; border-bottom: 1px solid #bcbcbc; }
        .product-item td { padding: 15px; font-size: 0.9rem; }

        /* TICKET VISUAL MEJORADO */
        #ticket-visual { width: 320px; padding: 25px; background: white; font-family: 'Courier New', monospace; position: absolute; left: -9999px; color: black; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-admin">
        <h2 id="formTitle">Gestión de Inventario</h2>
        <form id="prodForm">
            <input type="hidden" id="prodId"> 
            <div class="input-group"><label>Nombre</label><input type="text" id="nombre" required></div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="categoria" required>
                    <option value="Perfumes">Perfumes</option>
                    <option value="Bisutería">Bisutería</option>
                    <option value="Juguetes">Juguetes</option>
                    <option value="Moda">Moda</option>
                </select>
            </div>
            <div style="display: flex; gap: 15px;">
                <input type="number" id="precio" placeholder="Precio" required>
                <input type="number" id="existencias" placeholder="Stock" required>
            </div>
            <div class="input-group" style="margin-top:15px;"><label>URL Imagen</label><input type="text" id="imagen" required></div>
            <button type="submit" id="mainBtn">Guardar en Base de Datos</button>
            <button type="button" id="cancelBtn" style="display:none; background:#888; margin-top:10px;">Cancelar</button>
        </form>
    </div>

    <div class="card-admin">
        <h2>Inventario Actual</h2>
        <table class="product-list" id="lista"></table>
    </div>
</div>

<button class="btn-flotante" onclick="abrirVenta()">💰 Generar Venta</button>

<div id="modalVenta" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarVenta()">&times;</span>
        <h2 style="font-size: 1.2rem;">Nueva Venta Multicategoría</h2>
        <div id="lista-articulos"></div>
        <button class="btn-add-item" onclick="nuevaFilaVenta()">+ Añadir Producto</button>
        <div class="input-group"><label>Descuento total ($)</label><input type="number" id="v-desc" value="0"></div>
        <div class="input-group">
            <label>Método de Pago</label>
            <select id="v-metodo">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>
        </div>
        <button class="btn-ws" onclick="procesarVentaImagen()">Generar Ticket y Descontar 📲</button>
    </div>
</div>

<div id="ticket-visual">
    <div style="text-align:center; font-weight:bold; font-size:16px;">TICKET - INGE SHOP</div>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
    <div style="font-size:11px; text-align:center;">
        📍 Contacto:<br>
        📞 2761137068 | 241376199
    </div>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
    <div id="t-fecha" style="font-size:11px; text-align:center; margin-bottom:5px;"></div>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
    <table style="width:100%; font-size:11px; border-collapse:collapse;">
        <thead>
            <tr>
                <th style="text-align:left;">productos</th>
                <th style="text-align:center;">pz</th>
                <th style="text-align:right;">precio</th>
            </tr>
        </thead>
        <tbody id="t-items-body"></tbody>
    </table>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
    <div id="t-subtotal" style="text-align:right; font-size:11px;"></div>
    <div id="t-desc-val" style="text-align:right; font-size:11px;"></div>
    <div id="t-total" style="text-align:right; font-weight:bold; font-size:13px; margin:5px 0;"></div>
    <div style="font-size:11px;">Pago: <span id="t-metodo"></span></div>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
    <div style="text-align:center; font-size:11px; margin-top:5px;">✨ ¡Gracias por comprar en INGE SHOP!</div>
    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
</div>

<script>
    let productosBD = [];
    const form = document.getElementById('prodForm');
    const lista = document.getElementById('lista');
    let editando = false;

    async function cargar() {
        try {
            const res = await fetch('https://inge-shop.onrender.com/api/productos');
            productosBD = await res.json();
            lista.innerHTML = ""; 
            productosBD.forEach(p => {
                const fila = document.createElement('tr');
                fila.className = 'product-item';
                fila.innerHTML = `
                    <td><strong>${p.nombre}</strong><br><small>${p.categoria}</small></td>
                    <td>$${p.precio}</td>
                    <td>${p.existencias} pzs</td>
                    <td style="text-align:right">
                        <button onclick="prepararEdicion('${p._id}','${p.nombre}',${p.precio},${p.existencias},'${p.imagen}','${p.categoria}')">EDITAR</button>
                    </td>
                `;
                lista.appendChild(fila);
            });
        } catch (e) { console.error(e); }
    }

    function abrirVenta() {
        document.getElementById('modalVenta').style.display = 'flex';
        document.getElementById('lista-articulos').innerHTML = "";
        nuevaFilaVenta();
    }

    function cerrarVenta() { document.getElementById('modalVenta').style.display = 'none'; }

    function nuevaFilaVenta() {
        const div = document.createElement('div');
        div.className = 'fila-venta';
        div.innerHTML = `
            <label>Filtrar Categoría:</label>
            <select onchange="filtrarFila(this)" style="margin-bottom:8px; background:#f9f9f9;">
                <option value="Todos">Todas las categorías</option>
                <option value="Perfumes">Perfumes</option>
                <option value="Bisutería">Bisutería</option>
                <option value="Juguetes">Juguetes</option>
                <option value="Moda">Moda</option>
            </select>
            <select class="v-id" onchange="actualizarPrecioFila(this)">
                <option value="">Selecciona producto...</option>
                ${productosBD.map(p => `<option value="${p._id}" data-precio="${p.precio}" data-nombre="${p.nombre}" data-stock="${p.existencias}">${p.nombre} ($${p.precio})</option>`).join('')}
            </select>
            <div style="display:flex; gap:10px; margin-top:8px;">
                <input type="number" class="v-precio" placeholder="$" style="flex:1">
                <input type="number" class="v-cant" value="1" style="flex:0.5">
            </div>
        `;
        document.getElementById('lista-articulos').appendChild(div);
    }

    function filtrarFila(selectCat) {
        const cat = selectCat.value;
        const selectProd = selectCat.nextElementSibling;
        selectProd.innerHTML = '<option value="">Selecciona producto...</option>';
        productosBD.filter(p => cat === "Todos" || p.categoria === cat).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p._id;
            opt.text = `${p.nombre} ($${p.precio})`;
            opt.dataset.precio = p.precio;
            opt.dataset.nombre = p.nombre;
            opt.dataset.stock = p.existencias;
            selectProd.appendChild(opt);
        });
    }

    function actualizarPrecioFila(selectProd) {
        const opt = selectProd.options[selectProd.selectedIndex];
        selectProd.parentElement.querySelector('.v-precio').value = opt.dataset.precio || 0;
    }

    async function procesarVentaImagen() {
        const ids = document.querySelectorAll('.v-id');
        const precios = document.querySelectorAll('.v-precio');
        const cants = document.querySelectorAll('.v-cant');
        const desc = parseFloat(document.getElementById('v-desc').value) || 0;
        
        let subtotal = 0;
        const bodyTabla = document.getElementById('t-items-body');
        bodyTabla.innerHTML = "";

        for(let i=0; i<ids.length; i++) {
            if(ids[i].value) {
                const opt = ids[i].options[ids[i].selectedIndex];
                const cant = parseInt(cants[i].value);
                const precio = parseFloat(precios[i].value);
                const stock = parseInt(opt.dataset.stock);

                if(cant > stock) return alert(`Stock insuficiente de ${opt.dataset.nombre}`);

                await fetch(`https://inge-shop.onrender.com/api/productos/${ids[i].value}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ existencias: stock - cant })
                });

                let filaTotal = precio * cant;
                subtotal += filaTotal;
                bodyTabla.innerHTML += `<tr><td style="padding:2px 0;">${opt.dataset.nombre}</td><td style="text-align:center">${cant}</td><td style="text-align:right">$${filaTotal.toFixed(2)}</td></tr>`;
            }
        }

        const totalFinal = subtotal - desc;
        document.getElementById('t-fecha').innerText = `📅 ${new Date().toLocaleString()}`;
        document.getElementById('t-subtotal').innerText = `Subtotal: $${subtotal.toFixed(2)}`;
        document.getElementById('t-desc-val').innerText = `Descuento: -$${desc.toFixed(2)}`;
        document.getElementById('t-total').innerText = `Total: $${totalFinal.toFixed(2)}`;
        document.getElementById('t-metodo').innerText = document.getElementById('v-metodo').value;

        // GENERAR IMAGEN Y COPIAR (SIN DESCARGAR)
        const ticketElement = document.getElementById('ticket-visual');
        html2canvas(ticketElement, { scale: 2 }).then(canvas => {
            canvas.toBlob(async (blob) => {
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    await navigator.clipboard.write(data);
                    
                    const msj = `*INGE SHOP* ✨\n¡Gracias por tu compra! (Presiona Ctrl+V para enviar el ticket)`;
                    const urlWa = `https://api.whatsapp.com/send?text=${encodeURIComponent(msj)}`;
                    
                    window.open(urlWa, '_blank');
                    alert("✅ Stock actualizado. Ticket copiado. Elige al contacto y presiona Pegar.");
                    location.reload();
                } catch (err) {
                    console.error("Error al copiar:", err);
                    alert("No se pudo copiar automáticamente. Revisa los permisos.");
                }
            });
        });
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('prodId').value;
        const datos = {
            nombre: document.getElementById('nombre').value,
            precio: Number(document.getElementById('precio').value),
            existencias: Number(document.getElementById('existencias').value),
            imagen: document.getElementById('imagen').value,
            categoria: document.getElementById('categoria').value
        };
        const url = editando ? `https://inge-shop.onrender.com/api/productos/${id}` : 'https://inge-shop.onrender.com/api/productos';
        await fetch(url, { method: editando ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        location.reload();
    }

    function prepararEdicion(id, n, p, e, i, c) {
        editando = true;
        document.getElementById('prodId').value = id;
        document.getElementById('nombre').value = n;
        document.getElementById('precio').value = p;
        document.getElementById('existencias').value = e;
        document.getElementById('imagen').value = i;
        document.getElementById('categoria').value = c;
        document.getElementById('mainBtn').innerText = "Actualizar Producto";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    cargar();
</script>
</body>
</html>
